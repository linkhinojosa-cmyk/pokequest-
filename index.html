  <script type="text/babel">

    /* ── Persistent storage (same async API as window.storage) ── */
    const _store = {
      get: async (key) => {
        try { const v = localStorage.getItem(key); return v !== null ? { key, value: v } : null; }
        catch { return null; }
      },
      set: async (key, val) => { try { localStorage.setItem(key, String(val)); } catch {} return { key, value: val }; },
    };

    const { useState, useEffect, useRef } = React;

    /* ── Simple PIN hash so PINs aren\'t stored in plain text ── */
    const hashPin = async (pin) => {
      const buf = new TextEncoder().encode(pin + "pokequest-salt-2026");
      const h   = await crypto.subtle.digest("SHA-256", buf);
      return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("");
    };

    /* ─────────────────────────── LOGIN SCREEN ─────────────────────────── */
    function LoginScreen({ onLogin }) {
      const [mode,        setMode]        = useState("select"); // select | new | login
      const [users,       setUsers]       = useState([]);
      const [name,        setName]        = useState("");
      const [pin,         setPin]         = useState("");
      const [pin2,        setPin2]        = useState("");
      const [error,       setError]       = useState("");
      const [selectedUser,setSelectedUser]= useState(null);
      const [ready,       setReady]       = useState(false);

      useEffect(() => {
        (async () => {
          const r = await _store.get("pq-users");
          if (r) setUsers(JSON.parse(r.value));
          setReady(true);
        })();
      }, []);

      const saveUsers = async (newUsers) => {
        setUsers(newUsers);
        await _store.set("pq-users", JSON.stringify(newUsers));
      };

      const handleCreate = async () => {
        setError("");
        if (!name.trim())   { setError("Ingresa un nombre"); return; }
        if (pin.length < 4) { setError("El PIN debe tener al menos 4 dígitos"); return; }
        if (pin !== pin2)   { setError("Los PINs no coinciden"); return; }
        const username = name.trim().toLowerCase().replace(/[^a-z0-9]/gi, "");
        if (!username)      { setError("Nombre inválido"); return; }
        if (users.find(u => u.username === username)) { setError("Ese usuario ya existe — usa Iniciar sesión"); return; }
        const hashedPin = await hashPin(pin);
        const newUser = { username, displayName: name.trim(), pinHash: hashedPin, created: Date.now() };
        await saveUsers([...users, newUser]);
        await _store.set("pq-current", username);
        onLogin(newUser);
      };

      const handleLogin = async () => {
        setError("");
        if (!selectedUser) return;
        const hashed = await hashPin(pin);
        if (hashed !== selectedUser.pinHash) { setError("PIN incorrecto"); setPin(""); return; }
        await _store.set("pq-current", selectedUser.username);
        onLogin(selectedUser);
      };

      const handleDelete = async (username) => {
        if (!confirm(`¿Borrar entrenadora ${username} y TODO su progreso?`)) return;
        // wipe all keys for this user
        Object.keys(localStorage).filter(k => k.startsWith(`pq-${username}-`)).forEach(k => localStorage.removeItem(k));
        await saveUsers(users.filter(u => u.username !== username));
        setMode("select");
        setSelectedUser(null);
      };

      if (!ready) return null;

      return (
        <div style={{background:"#09091a",minHeight:"100vh",color:"#e2e8f0",
          display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"system-ui"}}>
          <div style={{width:"100%",maxWidth:380}}>

            {/* Logo */}
            <div style={{textAlign:"center",marginBottom:32}}>
              <div style={{fontSize:64,marginBottom:8}}>📕</div>
              <h1 style={{fontSize:30,fontWeight:900,color:"#f87171",margin:0,letterSpacing:-0.5}}>PokéQuest</h1>
              <p style={{fontSize:13,color:"#cbd5e1",marginTop:4}}>Inicia tu viaje Pokémon</p>
            </div>

            {/* SELECT MODE — list of trainers */}
            {mode === "select" && (
              <div>
                {users.length > 0 && (
                  <>
                    <p style={{fontSize:11,color:"#cbd5e1",textTransform:"uppercase",letterSpacing:1.5,marginBottom:10,fontWeight:"bold"}}>
                      Selecciona entrenadora
                    </p>
                    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
                      {users.map(u => (
                        <div key={u.username} style={{display:"flex",gap:6}}>
                          <button onClick={() => { setSelectedUser(u); setMode("login"); setPin(""); setError(""); }}
                            style={{flex:1,padding:"14px 16px",borderRadius:14,background:"#111827",
                              border:"1px solid #1e2030",color:"#e2e8f0",fontSize:15,fontWeight:"bold",
                              textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                            <span style={{fontSize:22}}>👤</span>
                            <span>{u.displayName}</span>
                          </button>
                          <button onClick={() => handleDelete(u.username)} title="Borrar"
                            style={{padding:"0 14px",borderRadius:14,background:"#1f0707",border:"1px solid #7f1d1d",
                              color:"#ef4444",cursor:"pointer",fontSize:14}}>✕</button>
                        </div>
                      ))}
                    </div>
                  </>
                )}
                <button onClick={() => { setMode("new"); setName(""); setPin(""); setPin2(""); setError(""); }}
                  style={{width:"100%",padding:"14px 0",borderRadius:14,background:"linear-gradient(135deg,#dc2626,#991b1b)",
                    border:"none",color:"#fff",fontSize:14,fontWeight:900,cursor:"pointer",boxShadow:"0 0 24px #dc262640"}}>
                  + Nueva entrenadora

                {users.length === 0 && (
                  <p style={{fontSize:12,color:"#cbd5e1",textAlign:"center",marginTop:16,lineHeight:1.5}}>
                    Crea una cuenta para empezar.<br/>Cada entrenadora tiene su propio progreso.
                  </p>
                )}
              </div>
            )}

            {/* LOGIN MODE — enter PIN for selected user */}
            {mode === "login" && selectedUser && (
              <div>
                <p style={{fontSize:11,color:"#cbd5e1",textTransform:"uppercase",letterSpacing:1.5,marginBottom:10,fontWeight:"bold"}}>
                  Bienvenida de vuelta
                </p>

                  marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:22}}>👤</span>
                  <span style={{fontSize:15,fontWeight:"bold"}}>{selectedUser.displayName}</span>
                </div>
                <input type="password" value={pin} onChange={e => setPin(e.target.value.replace(/\D/g,""))}
                  onKeyDown={e => e.key === "Enter" && handleLogin()}
                  placeholder="PIN" maxLength={8} inputMode="numeric"
                  style={{width:"100%",padding:"14px 16px",borderRadius:14,background:"#09091a",
                    border:"1px solid #1e2030",color:"#e2e8f0",fontSize:18,letterSpacing:4,
                    textAlign:"center",outline:"none",marginBottom:8}} autoFocus/>
                {error && <p style={{color:"#ef4444",fontSize:12,marginBottom:8,textAlign:"center"}}>{error}</p>}
                <button onClick={handleLogin}
                  style={{width:"100%",padding:"14px 0",borderRadius:14,background:"#166534",
                    border:"none",color:"#4ade80",fontSize:14,fontWeight:900,cursor:"pointer",marginBottom:8}}>
                  Entrar
                </button>
                <button onClick={() => { setMode("select"); setError(""); }}
                  style={{width:"100%",padding:"10px 0",borderRadius:14,background:"transparent",
                    border:"none",color:"#cbd5e1",fontSize:13,cursor:"pointer"}}>
                  ← Volver
                </button>
              </div>
            )}

            {/* NEW USER MODE */}
            {mode === "new" && (
              <div>
                <p style={{fontSize:11,color:"#cbd5e1",textTransform:"uppercase",letterSpacing:1.5,marginBottom:10,fontWeight:"bold"}}>
                  Crear cuenta nueva
                </p>
                <input value={name} onChange={e => setName(e.target.value)}
                  placeholder="Tu nombre (ej: Clau)" maxLength={20}
                  style={{width:"100%",padding:"14px 16px",borderRadius:14,background:"#09091a",
                    border:"1px solid #1e2030",color:"#e2e8f0",fontSize:15,outline:"none",marginBottom:10}}/>
                <input type="password" value={pin} onChange={e => setPin(e.target.value.replace(/\D/g,""))}
                  placeholder="PIN (4+ dígitos)" maxLength={8} inputMode="numeric"
                  style={{width:"100%",padding:"14px 16px",borderRadius:14,background:"#09091a",
                    border:"1px solid #1e2030",color:"#e2e8f0",fontSize:18,letterSpacing:4,textAlign:"center",
                    outline:"none",marginBottom:10}}/>
                <input type="password" value={pin2} onChange={e => setPin2(e.target.value.replace(/\D/g,""))}
                  onKeyDown={e => e.key === "Enter" && handleCreate()}
                  placeholder="Confirma tu PIN" maxLength={8} inputMode="numeric"
                  style={{width:"100%",padding:"14px 16px",borderRadius:14,background:"#09091a",
                    border:"1px solid #1e2030",color:"#e2e8f0",fontSize:18,letterSpacing:4,textAlign:"center",
                    outline:"none",marginBottom:8}}/>
                {error && <p style={{color:"#ef4444",fontSize:12,marginBottom:8,textAlign:"center"}}>{error}</p>}
                <button onClick={handleCreate}
                  style={{width:"100%",padding:"14px 0",borderRadius:14,background:"linear-gradient(135deg,#dc2626,#991b1b)",
                    border:"none",color:"#fff",fontSize:14,fontWeight:900,cursor:"pointer",marginBottom:8}}>
                  Crear y entrar
                </button>
                <button onClick={() => { setMode("select"); setError(""); }}
                  style={{width:"100%",padding:"10px 0",borderRadius:14,background:"transparent",
                    border:"none",color:"#cbd5e1",fontSize:13,cursor:"pointer"}}>
                  ← Volver
                </button>
                <p style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:14,lineHeight:1.5}}>
                  Tu PIN se guarda solo en este dispositivo.<br/>
                  No es recuperable si lo olvidas.
                </p>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ── Google Form URL input (used inside MainApp) ── */
    function FormUrlInput({ user, showToast }) {
      const [url, setUrl] = useState("");
      const [saved, setSaved] = useState(false);

      useEffect(() => {
        (async () => {
          const r = await _store.get(`pq-${user.username}-script-url`);
          if (r && r.value) { setUrl(r.value); setSaved(true); }
        })();
      }, [user]);

      const save = async () => {
        if (!url.trim()) {
          await _store.set(`pq-${user.username}-script-url`, "");
          setSaved(false);
          showToast("Configuración eliminada","✓");
          return;
        }
        if (!url.includes("script.google.com/macros") || !url.includes("/exec")) {
          showToast("URL inválida — debe ser un Apps Script /exec","⚠️");
          return;
        }
        await _store.set(`pq-${user.username}-script-url`, url.trim());
        setSaved(true);
        showToast("Apps Script guardado","✓");
      };

      return (
        <div>
          <input type="text" value={url} onChange={e => setUrl(e.target.value)}
            placeholder="https://script.google.com/macros/s/.../exec"
            style={{width:"100%",padding:"8px 12px",borderRadius:10,background:"#09091a",
              border:`1px solid ${saved?"#166534":"#1e2030"}`,color:"#e2e8f0",fontSize:11,outline:"none"}}/>
          <button onClick={save}
            style={{marginTop:6,width:"100%",padding:"8px 0",borderRadius:10,
              background: saved ? "#0d1a0d" : "#1a2a3a",
              border:`1px solid ${saved?"#166534":"#1e40af"}`,
              color: saved ? "#4ade80" : "#60a5fa",
              fontSize:12,fontWeight:"bold",cursor:"pointer"}}>
            {saved ? "✓ Guardado · Tocar para actualizar" : "Guardar URL"}
          </button>
        </div>
      );
    }

    /* ─────────────────────────── ROOT APP ─────────────────────────── */
    function App() {
      const [user, setUser] = useState(null);
      const [bootDone, setBootDone] = useState(false);

      useEffect(() => {
        (async () => {
          const cur = await _store.get("pq-current");
          if (cur && cur.value) {
            const usersR = await _store.get("pq-users");
            if (usersR) {
              const list = JSON.parse(usersR.value);
              const found = list.find(u => u.username === cur.value);
              if (found) setUser(found);
            }
          }
          setBootDone(true);
        })();
      }, []);

      const handleLogout = async () => {
        await _store.set("pq-current", "");
        setUser(null);
      };

      if (!bootDone) return null;
      if (!user) return <LoginScreen onLogin={setUser}/>;
      return <MainApp user={user} onLogout={handleLogout}/>;
    }

// Determine if a task should appear today based on its frequency
const shouldShowToday = (task, dateStr) => {
  if (task.archived) return false;
  const freq = task.frequency || "daily";
  if (freq === "daily" || freq === "once") return true;
  const d = new Date(dateStr + "T12:00:00");
  const dow = d.getDay();           // 0=Sun, 1=Mon ... 6=Sat
  const dom = d.getDate();          // 1-31
  if (freq === "weekdays") {
    const cfg = task.freqConfig || {};
    const days = cfg.days || [];
    return days.indexOf(dow) >= 0;
  }
  if (freq === "weekly") {
    const cfg = task.freqConfig || {};
    return Number(cfg.dayOfWeek) === dow;
  }
  if (freq === "monthly") {
    const cfg = task.freqConfig || {};
    return Number(cfg.dayOfMonth) === dom;
  }
  return true;
};

      setDraggedId(null); setDragOverId(null);

    // Reordenar: sacar draggedTask, insertarlo antes de targetTask
    const sameCategoryTasks = tasks
      .filter(t => t.category === draggedTask.category)
      .sort((a,b) => (a.order||0) - (b.order||0));
    const withoutDragged = sameCategoryTasks.filter(t => t.id !== draggedId);
    const targetIdx = withoutDragged.findIndex(t => t.id === dragOverId);
    withoutDragged.splice(targetIdx, 0, draggedTask);

  const importFile=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const raw=ev.target.result;
      const lines=raw.split(/\r?\n/).filter(l=>l.trim());
      if(!lines.length){showToast("Archivo vacío","⚠️");return;}

      // Detect CSV with header: first line contains "nombre" and at least one comma
      const isCsv = /^\s*nombre\s*,/i.test(lines[0]);
      let newTasks=[];

      if(isCsv){
        const headers=lines[0].split(",").map(h=>h.trim().toLowerCase());
        const idx={
          nombre:     headers.indexOf("nombre"),
          categoria:  headers.indexOf("categoria"),
          dificultad: headers.indexOf("dificultad"),
          icono:      headers.indexOf("icono"),
          subtrabajo: headers.indexOf("subtrabajo"),
        };
        let skipped=0;
        for(let i=1;i<lines.length;i++){
          const cols=lines[i].split(",").map(c=>c.trim());
          const nombre=idx.nombre>=0?cols[idx.nombre]:"";
          if(!nombre){skipped++;continue;}
          const cat=idx.categoria>=0?cols[idx.categoria].toLowerCase():"trabajo";
          const dif=idx.dificultad>=0?cols[idx.dificultad].toLowerCase():"medium";
          const ico=idx.icono>=0&&cols[idx.icono]?cols[idx.icono]:"📋";
          const sub=idx.subtrabajo>=0&&cols[idx.subtrabajo]?cols[idx.subtrabajo].toLowerCase():"inojosa";
          const validCat=["personal","hogar","trabajo"].includes(cat)?cat:"trabajo";
          const validDif=["easy","medium","hard"].includes(dif)?dif:"medium";
          const task={id:`imp-${Date.now()}-${i}`,name:nombre,category:validCat,difficulty:validDif,icon:ico};
          if(validCat==="trabajo") task.sub=["uber","inojosa"].includes(sub)?sub:"inojosa";
          newTasks.push(task);
        }
        const merged=[...tasks,...newTasks];
        setTasks(merged); pushTareasFull(merged);
        showToast(`${newTasks.length} actividades importadas (CSV)${skipped>0?` · ${skipped} omitidas`:""}`,"📂");
      } else {
        newTasks=lines.map((line,i)=>({id:`ino-${Date.now()}-${i}`,name:line.trim(),
          category:"trabajo",sub:"inojosa",difficulty:"medium",icon:"📋"}));
        const merged=[...tasks,...newTasks];
        setTasks(merged); pushTareasFull(merged);
        showToast(`${newTasks.length} actividades cargadas (Inojosa)`,"📂");
      }
      e.target.value="";
    };
    reader.readAsText(file);
  };

      // Derive from pinHash if available
      const u = user.pinHash ? user.pinHash.substring(0, 32) : ("nopin-" + user.username);

        userToken: userToken,
        ...params

                  <button onClick={()=>setSheetView("menu")}
                    style={{fontSize:12,color:"#34d399",background:"none",border:"none",cursor:"pointer",fontWeight:"bold"}}>
                    ← Volver
                  </button>
                  <select value={freqForm.frequency}
                    onChange={e=>setFreqForm({frequency:e.target.value,freqConfig:null})}

                    <option value="weekdays">📆 Días específicos de la semana</option>

                    <option value="monthly">🗓️ Mensual (1 día por mes)</option>
                    <option value="once">⭐ Única (desaparece al completar)</option>
                  </select>
                  {freqForm.frequency==="weekdays"&&(
                    <div>
                      <p style={{fontSize:11,color:MUTED,marginBottom:6,textTransform:"uppercase",letterSpacing:1.5,fontWeight:"bold"}}>

                      </p>
                      <div className="flex gap-1 flex-wrap">
                        {WEEKDAY_LABELS.map((lbl,i)=>{
                          const days=(freqForm.freqConfig&&freqForm.freqConfig.days)||[];
                          const on=days.indexOf(i)>=0;
                          return <button key={i} onClick={()=>{
                            const cur=(freqForm.freqConfig&&freqForm.freqConfig.days)||[];
                            const nxt=on?cur.filter(d=>d!==i):[...cur,i].sort();

                        <option key={i} value={i}>Cada {d}</option>)}
                    </select>
                  )}
                  {freqForm.frequency==="monthly"&&(
                    <select value={(freqForm.freqConfig&&freqForm.freqConfig.dayOfMonth)||1}
                      onChange={e=>setFreqForm(p=>({...p,freqConfig:{dayOfMonth:Number(e.target.value)}}))} style={{...inp,width:"100%"}}>

                      color:"#fff",border:"none",cursor:"pointer",
                      boxShadow:"0 0 24px #10b98140"}}>
                    ✓ Guardar frecuencia
                  </button>
                </div>
              )}

              <div style={{height:24}}/>
            </div>
          </div>
        );
      })()}
      {/* ━━━━━━━━━━━━━━━━━━━━━━━━━━ POKÉMON DETAIL MODAL ━━━━━━━━━━━━━━━━━━━ */}

        const preEvo=p.evo?POKEMON.find(x=>x.id===p.evo):null;

        const xpLeft=Math.max(0,p.xp-player.totalXpEarned);
        return(

                    <span style={{display:"inline-block",padding:"3px 12px",borderRadius:99,fontSize:12,
                      fontWeight:"bold",background:typeCol+"25",color:typeCol}}>
                      {p.type}
                    </span>
                  )}
                </div>

                {/* Large image */}
                <div style={{textAlign:"center",margin:"16px 0"}}>
                  <img
                    src={artSprite(p.id)}

                    style={{width:150,height:150,objectFit:"contain",display:"inline-block",
                      filter:reveal?"drop-shadow(0 4px 16px "+typeCol+"50)":"brightness(0) saturate(0) opacity(0.35)"}}

                  />
                </div>

                {/* Status banner */}
                {caught&&(

                    background:"#052e16",border:"1px solid #166534"}}>
                    <span style={{fontSize:13,fontWeight:"black",color:"#4ade80"}}>✓ ¡Capturado!</span>
                  </div>

                {!caught&&avail&&(
                  <button onClick={()=>{catchPokemon(p);setSelectedPoke(null);}}
                    style={{width:"100%",padding:"12px 0",borderRadius:12,marginBottom:12,cursor:"pointer",
                      background:"#dc2626",color:"#fff",fontSize:14,fontWeight:"black",border:"none",

                {!caught&&!avail&&(
                  <div style={{textAlign:"center",padding:"10px",marginBottom:12,borderRadius:12,background:CARD2}}>
                    <p style={{fontSize:12,color:MUTED}}>Necesitas</p>
                    <p style={{fontSize:22,fontWeight:"black",color:"#f87171"}}>🐚 {Math.max(0, p.xp-(player.caracolas||0))} más</p>
                    <div style={{height:6,borderRadius:99,background:"#1a1a38",margin:"8px 0 0"}}>
                      <div style={{height:"100%",borderRadius:99,background:"linear-gradient(90deg,#dc2626,#f87171)",
                        width:`${Math.min(100,((player.caracolas||0)/p.xp)*100)}%`,transition:"width 0.5s"}}/>
                    </div>
                    <p style={{fontSize:11,color:"#94a3b8",marginTop:4}}>
                      🐚 {(player.caracolas||0).toLocaleString()} / {p.xp}
                    </p>
                  </div>
                )}

                {/* XP info */}
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  <div style={{flex:1,padding:"8px 10px",borderRadius:10,background:CARD,textAlign:"center"}}>
                    <p style={{fontSize:10,color:MUTED}}>Costo</p>

                  {preEvo&&(

                      <p style={{fontSize:13,fontWeight:"bold",color:TXT,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>

                      </p>
                    </div>
                  )}
                </div>

                {/* Evolution chain */}
                {nextEvos.length>0&&(
                  <div style={{padding:"10px 12px",borderRadius:12,background:CARD,marginBottom:12,border:`1px solid ${BORD}`}}>
                    <p style={{fontSize:11,fontWeight:"black",color:MUTED,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>
                      Evoluciones
                    </p>
                    {nextEvos.map(evo=>{
                      const evoCaught=player.caughtIds.includes(evo.id);
                      const evoAvail=canCatch(evo);

                      return(
                        <div key={evo.id}

                          <img src={gridSprite(evo.id)} style={{width:36,height:36,objectFit:"contain",imageRendering:"pixelated",

                        </div>

                  </div>
                )}

                {/* Description */}
                {reveal&&(
                  <div style={{padding:"12px",borderRadius:12,background:CARD,border:`1px solid ${BORD}`}}>
                    <p style={{fontSize:11,fontWeight:"black",color:MUTED,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>

                )}
                {!reveal&&(
                  <div style={{padding:"12px",borderRadius:12,background:CARD,textAlign:"center"}}>
                    <p style={{fontSize:13,color:MUTED}}>Captura este Pokémon para desbloquear su descripción.</p>

      {/* ═══════════════════════════════════════ SHOP SCREEN ═════════════════ */}
      {screen==="shop"&&(()=>{
        const pesosBalance = coinsToPesos(player.coins||0);
        const weeklyPesos  = coinsToPesos(player.weekCoinsEarned||0);
        const weekPct      = Math.min(100,(weeklyPesos/WEEKLY_CAP_PESOS)*100);
        const remaining    = Math.max(0, WEEKLY_CAP_PESOS-weeklyPesos);
        return (
        <div className="max-w-md mx-auto px-4 pt-4">
          {/* Balance card */}
          <div className="rounded-2xl p-5 mb-4 text-center" style={{
            background:"linear-gradient(135deg,#1c1207,#3b1f04)",
            border:"1px solid #fbbf2440", boxShadow:"0 0 24px #fbbf2420"}}>
            <p style={{fontSize:11,color:"#fbbf24",fontWeight:"black",letterSpacing:1.5,textTransform:"uppercase"}}>
              💰 Tus monedas
            </p>
            <p style={{fontSize:32,fontWeight:900,color:"#fbbf24",margin:"4px 0 2px"}}>
              {formatPesos(pesosBalance)}
            </p>
            <p style={{fontSize:11,color:"#94a3b8"}}>
              {(player.coins||0).toLocaleString("es-CL")} monedas
            </p>
          </div>

          {/* Weekly cap progress */}
          <div className="rounded-2xl p-4 mb-4" style={{background:CARD,border:`1px solid ${BORD}`}}>
            <div className="flex justify-between items-center mb-2">
              <span style={{fontSize:12,fontWeight:"black",color:"#cbd5e1"}}>Esta semana</span>
              <span style={{fontSize:12,fontWeight:"black",color:weekPct>=100?"#ef4444":"#4ade80"}}>
                {formatPesos(weeklyPesos)} / {formatPesos(WEEKLY_CAP_PESOS)}
              </span>
            </div>
            <div style={{height:10,borderRadius:99,background:"#1a1a38",overflow:"hidden"}}>
              <div style={{height:"100%",width:weekPct+"%",
                background: weekPct>=100
                  ? "linear-gradient(90deg,#dc2626,#ef4444)"
                  : "linear-gradient(90deg,#10b981,#34d399)",
                transition:"width .6s"}}/>
            </div>
            <p style={{fontSize:11,color:"#94a3b8",marginTop:8,textAlign:"center"}}>
              {weekPct>=100
                ? "🛑 Cap semanal alcanzado · vuelve el lunes"
                : `Puedes ganar ${formatPesos(remaining)} más esta semana`}
            </p>
          </div>

          {/* ── CATÁLOGO (shared, admin-managed) ── */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{fontSize:11,color:"#94a3b8",fontWeight:"black",textTransform:"uppercase",letterSpacing:1.5}}>
              📚 Catálogo ({catalogo.length})

              <span style={{fontSize:10,color:"#fbbf24",fontWeight:"black",
                background:"#1c1207",border:"1px solid #92400e",
                padding:"3px 8px",borderRadius:99}}>
                👑 ADMIN

          </div>

            <details className="rounded-2xl p-4 mb-3" style={{background:CARD,border:"1px solid #fbbf2430"}}>

              </summary>
              <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:8}}>
                <div style={{display:"flex",gap:8}}>
                  <input value={newReward.icon} onChange={e=>setNewReward(p=>({...p,icon:e.target.value}))}
                    maxLength={2} style={{...inp,width:48,textAlign:"center",fontSize:20,padding:"8px 4px"}}/>
                  <input value={newReward.name} onChange={e=>setNewReward(p=>({...p,name:e.target.value}))}
                    placeholder="Nombre" style={{...inp,flex:1}}/>
                </div>
                <input type="number" inputMode="numeric"
                  value={newReward.costPesos}
                  onChange={e=>setNewReward(p=>({...p,costPesos:e.target.value}))}
                  placeholder="Costo en pesos" style={{...inp,width:"100%"}}/>
                <button onClick={addCatalogItem}
                  style={{width:"100%",padding:"12px 0",borderRadius:12,
                    background:"#92400e",color:"#fde68a",fontWeight:"black",border:"none",cursor:"pointer"}}>
                  ✓ Agregar al catálogo
                </button>
                <p style={{fontSize:10,color:"#94a3b8",textAlign:"center"}}>

                </p>

                const canAfford= (player.coins||0) >= costCoins;
                return (
                  <div key={r.id} className="rounded-2xl flex items-center gap-3"
                    style={{background:canAfford?CARD:CARD2,
                      border:`1px solid ${canAfford?"#fbbf2440":BORD}`,
                      borderLeft:`3px solid ${canAfford?"#fbbf24":DIM}`,
                      opacity:canAfford?1:0.6}}>
                    <div style={{paddingLeft:16,paddingTop:14,paddingBottom:14,fontSize:26}}>{r.icon}</div>

                  <button onClick={addReward}
                    style={{width:"100%",padding:"10px 0",borderRadius:10,
                      background:"#92400e",color:"#fde68a",fontWeight:"black",border:"none",cursor:"pointer"}}>

                  </button>
                  <p style={{fontSize:10,color:"#94a3b8",textAlign:"center"}}>

              {rewards.length===0 ? (
                <p style={{fontSize:11,color:"#94a3b8",textAlign:"center",padding:"10px"}}>

                <div className="space-y-2">
                  {rewards.map(r => {
                    const pesos    = coinsToPesos(r.costCoins);
                    const canAfford= (player.coins||0) >= r.costCoins;

                      <div key={r.id} className="rounded-xl flex items-center gap-2"
                        style={{background:canAfford?CARD2:CARD2,
                          border:`1px solid ${canAfford?"#fbbf2440":BORD}`,
                          opacity:canAfford?1:0.6}}>
                        <div style={{paddingLeft:12,padding:"10px 0 10px 12px",fontSize:22}}>{r.icon}</div>
                        <div className="flex-1 min-w-0 py-2">
                          <p style={{fontSize:13,fontWeight:"bold",color:TXT}}>{r.name}</p>
                          <p style={{fontSize:11,fontWeight:"black",color:"#fbbf24"}}>
                            {formatPesos(pesos)}
                          </p>
                        </div>
                        <div className="pr-2 py-2 flex gap-1.5">
                          <button onClick={()=>redeem(r)} disabled={!canAfford}
                            style={{padding:"6px 12px",borderRadius:10,fontSize:11,fontWeight:"black",
                              border:"none",cursor:canAfford?"pointer":"not-allowed",
                              background:canAfford?"#fbbf24":"#1f2937",
                              color:canAfford?"#000":"#4b5563"}}>
                            Canjear
                          </button>
                          <button onClick={async()=>{
                            const ok = await askConfirm({
                              title: "¿Eliminar recompensa?",
                              subtitle: "Solo se elimina de tus recompensas personales.",
                              icon: r.icon || "🗑️",
                              accent: "#dc2626",
                              glow: "#f87171",
                              details: [
                                {label:"Recompensa", value: r.name, color:"#f87171"},
                                {label:"Costo",      value: formatPesos(coinsToPesos(r.costCoins)), color:"#fbbf24"},
                              ],
                              confirmText: "Eliminar",
                            });
                            if(ok) deleteReward(r.id);
                          }}
                            style={{padding:"6px 8px",borderRadius:10,fontSize:11,
                              border:"none",cursor:"pointer",background:"#1f0707",color:"#ef4444"}}>
                            ✕
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </details>

          {/* Redemption history */}
          {redemptions.length>0 && (
            <details className="rounded-2xl p-4 mb-4" style={{background:CARD,border:`1px solid ${BORD}`}}>
              <summary style={{cursor:"pointer",fontSize:12,color:"#cbd5e1",fontWeight:"bold"}}>
                📜 Historial de canjes ({redemptions.length})
              </summary>
              <div style={{marginTop:10,maxHeight:280,overflowY:"auto"}}>
                {[...redemptions].reverse().map(r=>(
                  <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",
                    borderBottom:`1px solid ${BORD}`}}>
                    <span style={{fontSize:20}}>{r.rewardIcon}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:12,fontWeight:"bold",color:TXT}}>{r.rewardName}</p>
                      <p style={{fontSize:10,color:"#94a3b8"}}>{r.date}</p>
                    </div>
                    <span style={{fontSize:12,fontWeight:"black",color:"#ef4444"}}>
                      −{formatPesos(coinsToPesos(r.costCoins))}
                    </span>
                  </div>
                ))}
              </div>
            </details>
          )}
        </div>
        );
      })()}

      {/* ═══════════════════════════════════════ GASTOS SCREEN ══════════════════ */}

        {screen==="gastos"&&(
          <GastosScreen
            player={player}
            setPlayer={setPlayer}
            pushEstado={pushEstado}
            showToast={showToast}
            user={user}
            inp={inp} 
            CARD={CARD} BORD={BORD} MUTED={MUTED}
          />
        )}


      <div className="fixed bottom-0 inset-x-0" style={{
        background:"#09091f",
        borderTop:`1px solid ${BORD}`,
        paddingBottom:"env(safe-area-inset-bottom, 0px)"
      }}>
        <div className="max-w-md mx-auto grid grid-cols-5">
          {[
            ["play","⚔️","Misiones"],
            ["pokedex","📕","Pokédex"],
            ["shop","💰","Tienda"],
            ["gastos","💸","Gastos"],
            ["edit","⚙️","Editar"],
          ].map(([key,ico,lbl])=>{
            const active=screen===key;
            const badge=key==="pokedex"&&availableList.length>0;
            return(
              <button key={key} onClick={()=>setScreen(key)}
                className="py-2 flex flex-col items-center gap-0.5 relative transition-all"
                style={{color:active?"#f87171":MUTED}}>
                <span className="text-lg relative">
                  {ico}
                  {badge&&(
                    <span className="absolute -top-1 -right-1 w-3.5 h-3.5 rounded-full text-white font-black"
                      style={{background:"#dc2626",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {availableList.length}
                    </span>
                  )}
                </span>
                <span className="text-xs font-bold">{lbl}</span>
                {active&&<div className="absolute bottom-0 inset-x-4 h-0.5 rounded-full" style={{background:"#f87171"}}/>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    setTimeout(() => {
      const s = document.getElementById('splash');
      if (s) { s.classList.add('fade'); setTimeout(() => s.remove(), 450); }
    }, 300);
  </script>
</body>
</html>
